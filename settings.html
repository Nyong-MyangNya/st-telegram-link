<div class="st-telegram-link-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Telegram Link Settings</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
        </div>
        <div class="inline-drawer-content">
            <label for="telegram_bot_token">Bot Token</label>
            <input id="telegram_bot_token" type="text" value="{{token}}" />
            <label for="telegram_chat_id">Chat ID</label>
            <input id="telegram_chat_id" type="text" value="{{chatId}}" />
            <button id="save_telegram_settings">Save</button>
        </div>
    </div>
</div>
